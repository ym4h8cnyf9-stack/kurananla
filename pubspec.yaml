name: kurananla
description: "Duolingo tarzı Kur'an öğrenme uygulaması - En çok geçen kelimeleri öğretin."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  flutter_tts: ^4.2.2
  sqflite: ^2.3.0
  path: ^1.8.3
  provider: ^6.1.0
  shared_preferences: ^2.2.2
  http: ^1.1.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/words/
    - assets/data/

  